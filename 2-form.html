<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>

    <script type="module" crossorigin src="/goit-advancedjs-hw-01/2-form.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-advancedjs-hw-01/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="stylesheet" crossorigin href="/goit-advancedjs-hw-01/assets/styles-DAV0CpWU.css">
  </head>
  <body>
    <div class="container">
      <p class="go-back-link">
        <a class="link" href="./index.html">Go back</a>
      </p>

      <form class="feedback-form js-feedback-form" autocomplete="off">
        <label class="form-field-wrapper">
          Email
          <input class="form-input" type="email" name="email" autofocus />
        </label>
        <label class="form-field-wrapper">
          Message
          <textarea
            class="form-input form-textarea"
            name="message"
            rows="8"
          ></textarea>
        </label>
        <button class="form-btn" type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
